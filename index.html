<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAR to Optical Translation Model</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 { margin-top: 0; font-weight: 600; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-muted); margin-bottom: 30px; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input[type="file"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }

        .grid-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: var(--text-muted);
        }

        .img-wrapper {
            width: 256px;
            height: 256px;
            background-color: #0b1120;
            border: 1px dashed var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>SAR to Optical Translation</h2>
        <p class="subtitle">Atrous Conditional Generative Adversarial Network (cGAN) Inference</p>
        
        <div class="controls">
            <input type="file" id="sarInput" accept="image/png, image/jpeg">
            <button onclick="translateImage()">Synthesize Optical Data</button>
        </div>
        
        <div class="grid-container">
            <div class="image-card">
                <h3>Input (SAR)</h3>
                <div class="img-wrapper">
                    <img id="inputDisplay" src="" alt="SAR Input">
                </div>
            </div>
            
            <div class="image-card">
                <h3>Output (Optical)</h3>
                <div class="img-wrapper">
                    <div class="spinner" id="loadingSpinner"></div>
                    <img id="outputDisplay" src="" alt="Optical Output">
                </div>
            </div>
        </div>
    </div>

    <script>
        async function translateImage() {
            const fileInput = document.getElementById('sarInput');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const inputDisplay = document.getElementById('inputDisplay');
            const outputDisplay = document.getElementById('outputDisplay');

            if (fileInput.files.length === 0) {
                alert("Upload a valid SAR image tensor first.");
                return;
            }

            const file = fileInput.files[0];
            
            // Render local input
            inputDisplay.src = URL.createObjectURL(file);
            inputDisplay.style.display = 'block';

            // Reset output state
            outputDisplay.style.display = 'none';
            loadingSpinner.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('https://sd09-sar-to-optical-api.hf.space/synthesize/', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const imageBlob = await response.blob();
                outputDisplay.src = URL.createObjectURL(imageBlob);
                loadingSpinner.style.display = 'none';
                outputDisplay.style.display = 'block';

            } catch (error) {
                loadingSpinner.style.display = 'none';
                alert("Inference Failed. Check Uvicorn terminal logs.\nError: " + error.message);
            }
        }
    </script>
</body>
</html>
